name: Deploy to server

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to OpenClaw server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: CEREBRAS_API_KEY=${{ secrets.CEREBRAS_API_KEY }}
          # script_stop injects an `exit $?` after EACH line of the script
          # (drone-ssh plugin.go scriptCommands), so a failure on one line
          # aborts the session before the next line runs. We need
          # restart-gateway failure to flow into rollback, so the restart +
          # healthcheck + rollback chain MUST be a single line.
          script_stop: true
          script: |
            python3 -c "import os,pathlib; p=pathlib.Path.home()/'.bashrc'; t=p.read_text(); k=os.environ.get('CEREBRAS_API_KEY',''); p.write_text(t+'\nexport CEREBRAS_API_KEY='+k+'\n') if k and 'CEREBRAS_API_KEY' not in t else None"
            cd ~/openclaw-optimization-guide
            git fetch origin master
            git reset --hard origin/master
            git clean -fd -e .ralph -e .clawhub -e .openclaw -e skills/open-ralph -e workspace
            bash scripts/sync-workspace.sh
            python3 scripts/patches/0001-providers.py
            python3 scripts/patches/0002-optimizations.py
            bash scripts/sync-hooks.sh
            bash scripts/setup-lightrag.sh || true
            bash scripts/start-lightrag.sh || true
            bash scripts/start-lightrag-watcher.sh || true
            bash scripts/setup-repowise.sh || true
            bash scripts/restart-gateway.sh && HEALTHCHECK_RETRIES=60 HEALTHCHECK_SLEEP=2 bash scripts/healthcheck.sh || bash scripts/rollback.sh
