name: Deploy to server

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to OpenClaw server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script_stop: true
          script: |
            cd ~/openclaw-optimization-guide && git pull origin master
            bash scripts/sync-workspace.sh
            python3 scripts/patches/0001-providers.py
            bash scripts/restart-gateway.sh
            bash scripts/healthcheck.sh || bash scripts/rollback.sh
